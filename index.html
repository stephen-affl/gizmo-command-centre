const CACHE_BUST_VERSION = "4.3"; // Bump to clear stale localStorage
const FEAR_GREED_API = "https://api.alternative.me/fng/?limit=1";
const FEAR_GREED_REFRESH_MS = 300000; // Every 5 minutes

// ══════════════════════════════════════════════════════════════
// Cache Bust — clears stale localStorage when version changes
// ══════════════════════════════════════════════════════════════
(function cacheBust() {
  const stored = localStorage.getItem("gizmo_cache_version");
  if (stored !== CACHE_BUST_VERSION) {
    console.log("[Gizmo] Cache bust: " + stored + " → " + CACHE_BUST_VERSION);
    localStorage.removeItem("gizmo_state");
    localStorage.setItem("gizmo_cache_version", CACHE_BUST_VERSION);
  }
})();

// ══════════════════════════════════════════════════════════════
// Market Hours Awareness — Feature 8
// ══════════════════════════════════════════════════════════════
function getMarketState() {
  const now = new Date();
  const mt = new Date(now.toLocaleString("en-US", { timeZone: "America/Edmonton" }));
  const h = mt.getHours(), m = mt.getMinutes(), day = mt.getDay();
  if (day === 0 || day === 6) return "weekend";
  if (h < 5) return "closed";
  if (h < 7 || (h === 7 && m < 30)) return "premarket";
  if (h < 14) return "open";
  if (h < 16) return "afterhours";
  return "closed";
}

function getMarketBadge() {
  const s = getMarketState();
  return { weekend: { text: "WEEKEND", color: "#7c4dff" }, premarket: { text: "PRE-MARKET", color: "#ffab00" }, open: { text: "MARKET OPEN", color: "#00e676" }, afterhours: { text: "AFTER HOURS", color: "#ff9100" }, closed: { text: "CLOSED", color: "#546e7a" } }[s];
}

// ══════════════════════════════════════════════════════════════
// Live Fear & Greed API — Feature 2
// ══════════════════════════════════════════════════════════════
let liveFearGreed = null;

async function fetchFearGreed() {
  try {
    const resp = await fetch(FEAR_GREED_API);
    if (resp.ok) {
      const d = await resp.json();
      const entry = d.data && d.data[0];
      if (entry) {
        liveFearGreed = {
          value: parseInt(entry.value),
          label: entry.value_classification,
          updated: new Date(parseInt(entry.timestamp) * 1000).toISOString().slice(0, 10),
        };
        console.log("[Gizmo] Fear & Greed updated:", liveFearGreed.value, liveFearGreed.label);
        if (window.__gizmoSyncCallback) window.__gizmoSyncCallback();
      }
    }
  } catch (e) {
    console.log("[Gizmo] Fear & Greed fetch failed:", e.message);
  }
}

// Fetch immediately and then every 5 minutes
fetchFearGreed();
setInterval(fetchFearGreed, FEAR_GREED_REFRESH_MS);

// ══════════════════════════════════════════════════════════════
// State Sync Engine — tries local server first, falls back to OneDrive
// ══════════════════════════════════════════════════════════════
let lastSyncTime = null;
let syncStatus = "offline";

function updateSyncBanner() {
  const dot = document.getElementById("sync-dot");
  const text = document.getElementById("sync-text");
  if (!dot || !text) return;

  dot.className = "dot " + syncStatus;
  if (syncStatus === "fresh") {
    const ago = lastSyncTime ? Math.round((Date.now() - lastSyncTime) / 1000) : 0;
    text.textContent = ago < 60 ? "Synced " + ago + "s ago" : "Synced " + Math.round(ago/60) + "m ago";
  } else if (syncStatus === "stale") {
    text.textContent = "Sync delayed — using cached data";
  } else {
    const hasSource = STATE_SERVER_URL || ONEDRIVE_STATE_URL;
    text.textContent = hasSource ? "Connecting..." : "No sync URL configured — using local data";
  }
}

// Update the banner every 10 seconds
setInterval(updateSyncBanner, 10000);

// Global sync function that the React app can call
window.__gizmoSyncCallback = null;

async function fetchRemoteState() {
  // Try local server first (home WiFi)
  if (STATE_SERVER_URL) {
    try {
      const resp = await fetch(STATE_SERVER_URL + "?t=" + Date.now(), { cache: "no-store" });
      if (resp.ok) {
        const data = await resp.json();
        lastSyncTime = Date.now();
        syncStatus = "fresh";
        updateSyncBanner();
        return data;
      }
    } catch (e) {
      console.log("[Gizmo] Local server unreachable, trying OneDrive...");
    }
  }
  // Fallback to OneDrive
  if (ONEDRIVE_STATE_URL) {
    try {
      const resp = await fetch(ONEDRIVE_STATE_URL + "?t=" + Date.now(), { cache: "no-store" });
      if (resp.ok) {
        const data = await resp.json();
        lastSyncTime = Date.now();
        syncStatus = "fresh";
        updateSyncBanner();
        return data;
      }
    } catch (e) {
      console.log("[Gizmo] OneDrive sync also failed:", e.message);
    }
  }
  syncStatus = lastSyncTime ? "stale" : "offline";
  updateSyncBanner();
  return null;
}

// Auto-fetch loop
setInterval(async () => {
  const remote = await fetchRemoteState();
  if (remote && window.__gizmoSyncCallback) {
    window.__gizmoSyncCallback(remote);
  }
}, SYNC_INTERVAL_MS);

// Initial fetch
setTimeout(async () => {
  const remote = await fetchRemoteState();
  if (remote && window.__gizmoSyncCallback) {
    window.__gizmoSyncCallback(remote);

}, 2000);

              ["NET WORTH", "$" + fmtK(fin.netWorth) + " CAD", C.cyan, fin.netWorth / 1500000 * 100, "$1.5M FI TARGET"],
              ["PORTFOLIO", "$" + fmtK(fin.portfolio) + " CAD", C.blue, null, null],
              ["BTC", fin.btc + " / " + fin.btcTarget + " BTC", C.gold, (fin.btc / fin.btcTarget) * 100, fin.btcTarget + " BTC TARGET"],
              ["ONDS", fin.onds + " / " + fin.ondsMax, fin.onds >= 135 ? C.red : fin.onds >= 115 ? C.orange : C.cyan, (fin.onds / fin.ondsMax) * 100, "MAX 140"],
              ["MARGIN", "$" + fmtK(Math.abs(fin.margin)) + " / $" + fmtK(Math.abs(fin.marginMax)), Math.abs(fin.margin) >= 35000 ? C.red : Math.abs(fin.margin) >= 25000 ? C.orange : C.green, (Math.abs(fin.margin) / Math.abs(fin.marginMax)) * 100, "LIMIT $40K"],
              ["BURN", "$" + fin.monthlyBurn.toLocaleString() + " CAD", C.t2, null, null],
              ["SURPLUS", "+$" + fin.monthlySurplus.toLocaleString() + " CAD", C.green, null, null],
            ].map(([label, value, color, pct, sub], i) => (
              <div key={i} style={{ marginBottom: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 2 }}>
                  <span style={{ ...S.lbl, margin: 0 }}>{label}</span>
                  <span style={{ ...S.val, fontSize: 13, color }}>{value}</span>
                </div>
                {sub && <div style={{ ...S.exo, fontSize: 9, color: C.t3, letterSpacing: 1, textAlign: "right", marginBottom: 2 }}>{sub}</div>}
                {pct != null && <Bar pct={pct} color={color} height={3} />}
              </div>
            ))}
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 6 }}>
              <span style={{ ...S.lbl, margin: 0 }}>PHASE</span>
              <span style={{ ...S.badge, background: "rgba(224,64,251,.11)", color: C.purple }}>Phase {fin.phase} — Flywheel Active</span>
            </div>
          </Panel>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
          <Panel title="↻ FLYWHEEL STATUS">
            {[["BTCI SHARES", fw.btciShares.toLocaleString(), C.gold], ["QQQI SHARES", fw.qqqiShares.toLocaleString(), C.cyan], ["DEPLOYED", fmtUSD(fw.totalDeployedUSD) + " USD", C.blue], ["DIV GROWTH", "+$" + fw.monthlyDivGrowth + "/mo", C.green]].map(([l, v, c], i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 11 }}>
                <span style={{ ...S.lbl, margin: 0 }}>{l}</span>
                <span style={{ ...S.val, fontSize: 15, color: c }}>{v}</span>
              </div>
            ))}
            <div style={{ borderTop: `1px solid ${C.b2}`, paddingTop: 11, marginTop: 3 }}>
              <div style={{ ...S.lbl, marginBottom: 8 }}>PROJECTION</div>
              {[["Jun 2026", "93%", false], ["Sep 2026", "94%", false], ["Dec 2026", "95%", false], ["Mar 2027", "97%", false], ["Jun 2027", "~100% ✦", true]].map(([d, p, hi], i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: `1px solid ${C.b}`, color: hi ? C.green : C.t3, fontWeight: hi ? 700 : 400 }}>
                  <span style={{ fontSize: 12 }}>{d}</span>
                  <span style={{ ...S.mono, fontSize: 12, color: hi ? C.green : C.gold }}>{p}</span>
                </div>
              ))}
            </div>
          </Panel>
          <Panel title="⚠ ALERTS" right={`${state.alerts.length} active`}>
            {state.alerts.map((a, i) => {
              const ac = a.level === "red" ? C.red : C.orange;
              return (
                <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 9, padding: "8px 0", borderBottom: `1px solid ${C.b}` }}>
                  <span style={{ width: 8, height: 8, borderRadius: "50%", background: ac, boxShadow: `0 0 6px ${ac}`, flexShrink: 0, marginTop: 3, animation: a.level === "red" ? "pulse 1s infinite" : "pulse 2s infinite", display: "block" }} />
                  <span style={{ color: C.t2, fontSize: 13, lineHeight: 1.4 }}>{a.text}</span>
                </div>
              );
            })}
          </Panel>
          <Panel title="⚒ CRON HEALTH">
            {Object.entries(state.cronHealth).map(([name, info]) => (
              <div key={name} style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 0", borderBottom: `1px solid ${C.b}` }}>
                <div style={{ width: 7, height: 7, borderRadius: "50%", background: info.status === "error" ? C.red : C.green, boxShadow: `0 0 4px ${info.status === "error" ? C.red : C.green}` }} />
                <span style={{ ...S.mono, fontSize: 12, color: C.t2, minWidth: 80 }}>{name}</span>
                <span style={{ fontSize: 11, color: C.t3 }}>{info.note}{info.errors ? ` (${info.errors})` : ""}</span>
              </div>
            ))}
          </Panel>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1.5fr 1fr", gap: 12 }}>
          <Panel title="⚡ TRADING ACTIVITY" titleColor={C.cyan} right={`${state.trades.month} · Net: ${state.trades.netUSD >= 0 ? "+" : ""}${fmtUSD(state.trades.netUSD)}`}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 6, marginBottom: 14 }}>
              {[["Premiums", state.trades.premiumsCollected, C.cyan],["Winners", state.trades.closedWinners, C.green],["Losers", state.trades.closedLosers, C.red],["Day Trades", state.trades.dayTrades, C.gold],["Reinvested", state.trades.flywheelReinvested, C.purple]].map(([l, v, c]) => (
                <div key={l} style={{ background: "rgba(0,170,255,.04)", borderRadius: 4, padding: "6px 4px", textAlign: "center" }}>
                  <div style={{ ...S.mono, fontSize: 13, fontWeight: 700, color: c }}>{v < 0 ? "-" : v > 0 ? "+" : ""}{fmtUSD(v)}</div>
                  <div style={{ ...S.exo, fontSize: 7, color: C.t3, letterSpacing: 1.5, textTransform: "uppercase", marginTop: 2 }}>{l}</div>
                </div>
              ))}
            </div>
            <div style={S.lbl}>RECENT TRADES</div>
            {state.trades.recent.map((t, i) => {
              const actionColors = { "CC BTC": C.green, "CSP STO": C.cyan, "CSP BTC": C.green, "CC STO": C.cyan, "DAY TRADE": C.gold };
              const ac = actionColors[t.action] || C.t2;
              return (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", borderBottom: `1px solid ${C.b}` }}>
                  <span style={{ ...S.mono, fontSize: 10, color: C.t3, minWidth: 42 }}>{t.date.slice(5)}</span>
                  <span style={{ ...S.mono, fontSize: 12, fontWeight: 700, color: C.t, minWidth: 40 }}>{t.ticker}</span>
                  <span style={{ ...S.badge, background: `${ac}18`, color: ac, fontSize: 8, letterSpacing: 1 }}>{t.action}</span>
                  {t.strike && <span style={{ ...S.mono, fontSize: 10, color: C.t3 }}>${t.strike}</span>}
                  <span style={{ marginLeft: "auto", ...S.mono, fontSize: 12, fontWeight: 700, color: t.pl != null ? (t.pl >= 0 ? C.green : C.red) : C.cyan }}>
                    {t.pl != null ? (t.pl >= 0 ? "+" : "") + fmtUSD(t.pl) : t.premium ? fmtUSD(t.premium) + " prem" : ""}
                  </span>
                  {t.note && <span style={{ fontSize: 9, color: C.t3, maxWidth: 80, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.note}</span>}
                </div>
              );
            })}
          </Panel>
          <Panel title="☰ INVESTMENT POLICY" titleColor={C.gold}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
              <span style={{ ...S.badge, background: `${C.purple}22`, color: C.purple, fontSize: 12, padding: "4px 12px" }}>Phase {state.policy.phase}</span>
              <span style={{ ...S.exo, fontSize: 13, fontWeight: 700, color: C.t, letterSpacing: 1 }}>{state.policy.phaseName}</span>
            </div>
            <div style={S.lbl}>ALLOCATION TARGETS vs ACTUAL</div>
            {Object.entries(state.policy.allocation).map(([key, { target, actual }]) => {
              const diff = actual - target;
              const diffColor = Math.abs(diff) <= 2 ? C.green : Math.abs(diff) <= 5 ? C.gold : C.orange;
              const labels = { wheel: "Wheel", yieldETFs: "Yield ETFs", coreIndex: "Core Index", btc: "BTC", oly: "OLY", cash: "Cash" };
              return (
                <div key={key} style={{ marginBottom: 10 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 3 }}>
                    <span style={{ ...S.exo, fontSize: 10, color: C.t2, letterSpacing: 1, fontWeight: 600 }}>{labels[key] || key}</span>
                    <span style={{ ...S.mono, fontSize: 10, color: diffColor }}>{actual}% / {target}% <span style={{ fontSize: 9, opacity: 0.7 }}>({diff > 0 ? "+" : ""}{diff})</span></span>
                  </div>
                  <div style={{ position: "relative", height: 6, background: "rgba(0,170,255,.08)", borderRadius: 3, overflow: "hidden" }}>
                    <div style={{ position: "absolute", height: "100%", width: `${actual}%`, background: diffColor, borderRadius: 3, opacity: 0.7, transition: "width .6s" }} />
                    <div style={{ position: "absolute", height: "100%", width: 2, left: `${target}%`, background: C.t, opacity: 0.5, borderRadius: 1 }} />
                  </div>
                </div>
              );
            })}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 14, padding: "8px 0", borderTop: `1px solid ${C.b}` }}>
              <span style={{ ...S.lbl, margin: 0 }}>NEXT REVIEW</span>
              <span style={{ ...S.mono, fontSize: 12, color: C.cyan }}>{state.policy.nextReview}</span>
            </div>
            <div style={{ background: "rgba(255,234,0,.04)", border: "1px solid rgba(255,234,0,.18)", borderRadius: 6, padding: 11, marginTop: 10 }}>
              <div style={{ fontSize: 13, color: C.gold, fontWeight: 600, lineHeight: 1.5, textAlign: "center", fontStyle: "italic" }}>“{state.policy.anchor}”</div>
            </div>
          </Panel>
        </div>
      </div>
    );
  };
  const CommandPalette = () => {
    if (!cmdOpen) return null;
    const actions = [
      { label: "Capture idea", action: () => {
        const text = cmdQuery.replace(/^capture\s*/i, "").trim();
        if (text) {
          const item = { id: Date.now(), text, ts: new Date().toISOString(), domain: null };
          save({ ...state, inbox: [item, ...state.inbox] });
        }
        setCmdOpen(false); setCmdQuery("");
      }},
      { label: "Log energy", action: () => { setTab("today"); setCmdOpen(false); } },
      { label: "View rocks", action: () => { setTab("rocks"); setCmdOpen(false); } },
      { label: "Ask Gizmo", action: () => { setTab("gizmo"); setCmdOpen(false); } },
      { label: "Financial Freedom", action: () => { setTab("freedom"); setCmdOpen(false); } },
      { label: "View inbox (" + state.inbox.length + ")", action: () => { setTab("gizmo"); setCmdOpen(false); } },
      { label: "Export state", action: () => { const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" }); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = "state.json"; a.click(); setCmdOpen(false); } },
    ];
    const filtered = cmdQuery ? actions.filter((a) => a.label.toLowerCase().includes(cmdQuery.toLowerCase())) : actions;
    return (
      <div onClick={() => setCmdOpen(false)} style={{ position: "fixed", inset: 0, background: "rgba(2,10,20,.85)", zIndex: 1000, display: "flex", alignItems: "flex-start", justifyContent: "center", paddingTop: 120 }}>
        <div onClick={(e) => e.stopPropagation()} style={{ width: 420, background: C.s1, border: `1px solid ${C.b2}`, borderRadius: 10, overflow: "hidden", boxShadow: "0 0 40px rgba(0,170,255,.15)" }}>
          <div style={{ padding: "14px 16px", borderBottom: `1px solid ${C.b2}` }}>
            <input autoFocus value={cmdQuery} onChange={(e) => setCmdQuery(e.target.value)} placeholder="Type a command..." style={{ width: "100%", background: "transparent", border: "none", color: C.t, fontFamily: "'Rajdhani', sans-serif", fontSize: 16, outline: "none" }} />
          </div>
          <div style={{ maxHeight: 300, overflowY: "auto" }}>
            {filtered.map((a, i) => (
              <div key={i} onClick={a.action} style={{ padding: "10px 16px", cursor: "pointer", borderBottom: `1px solid ${C.b}`, color: C.t2, fontSize: 14, transition: "all .1s" }} onMouseEnter={(e) => { e.currentTarget.style.background = "rgba(0,170,255,.08)"; e.currentTarget.style.color = C.glow; }} onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = C.t2; }}>
                ⚡ {a.label}
              </div>
            ))}
          </div>
          <div style={{ padding: "6px 16px", borderTop: `1px solid ${C.b}`, fontSize: 10, color: C.t3 }}>⌘K to toggle · ESC to close</div>
        </div>
      </div>
    );
  };
  const renderView = () => {
    switch (tab) {
      case "dashboard": return <DashboardView />;
      case "today": return <TodayView />;
      case "freedom": return <FreedomView />;
      case "rocks": return <RocksView />;
      case "agents": return <AgentsView />;
      case "gizmo": return <GizmoView />;
      default: return <DashboardView />;
    }
  };
  return (
    <div style={S.root}>
      <style>{css}</style>
      <div style={S.scanOverlay} />
      <div style={S.content}>
        <Header />
        <NavBar />
        {renderView()}
        <div style={{ textAlign: "center", padding: 10, borderTop: `1px solid ${C.b2}`, position: "relative", zIndex: 1 }}>
          <span style={{ ...S.exo, fontSize: 9, color: C.t3, letterSpacing: 2 }}>GIZMO v4.0 ◆ COMMAND CENTRE ◆ LIVE</span>
        </div>
      </div>
      <CommandPalette />
      <button onClick={() => { setCmdOpen(true); setCmdQuery(""); }} style={{ position: "fixed", bottom: 20, right: 20, width: 44, height: 44, borderRadius: "50%", background: C.s1, border: `1px solid ${C.b2}`, color: C.glow, fontSize: 18, cursor: "pointer", boxShadow: "0 0 16px rgba(0,170,255,.2)", zIndex: 999, display: "flex", alignItems: "center", justifyContent: "center" }}>⚡</button>
    </div>
  );
}


// ── Mount ──
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<GizmoCommandCentre />);
  </script>

  <!-- Service Worker Registration -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js").catch(function(e) { console.log("SW reg failed:", e); });
    }
  </script>
</body>
</html>
